name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (shared)
        run: pnpm --filter '@at-2/shared' test -- --reporter=verbose

      - name: Test (api)
        run: pnpm --filter '@at-2/api' test -- --reporter=verbose
        env:
          MONGODB_URI_TEST: ${{ secrets.MONGODB_URI_TEST }}

      - name: Test (web)
        run: pnpm --filter '@at-2/web' test -- --reporter=verbose
