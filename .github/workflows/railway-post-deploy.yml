name: Inject Railway PR URL into Vercel

on:
  deployment_status:

permissions:
  contents: read

jobs:
  # Always-on job: logs every deployment_status event for debugging.
  debug-event:
    runs-on: ubuntu-latest
    steps:
      - name: Print deployment_status event
        run: |
          echo "=== deployment_status event ==="
          echo "state:           ${{ github.event.deployment_status.state }}"
          echo "environment:     ${{ github.event.deployment.environment }}"
          echo "ref:             ${{ github.event.deployment.ref }}"
          echo "environment_url: ${{ github.event.deployment_status.environment_url }}"
          echo "creator login:   ${{ github.event.deployment.creator.login }}"
          echo "--- full event payload ---"
          echo '${{ toJSON(github.event) }}'

  inject-api-url:
    runs-on: ubuntu-latest
    # Run only for Railway PR deployments:
    # - creator is railway-app[bot]                    (filters out Vercel's own events)
    # - state is success                               (filters out the in_progress event)
    # - environment does not contain 'production'      (skip production deploys)
    if: |
      github.event.deployment.creator.login == 'railway-app[bot]' &&
      github.event.deployment_status.state == 'success' &&
      !contains(github.event.deployment.environment, 'production')

    steps:
      - name: Fetch Railway service URL via GraphQL API
        id: railway
        env:
          RAILWAY_TOKEN: ${{ secrets.AT_2_ENV_TOKEN }}
        run: |
          # The deployment environment_url is the Railway dashboard page, not the
          # service URL. Extract the environmentId from its query string and query
          # the Railway GraphQL API for the actual service domain.
          ENVIRONMENT_URL="${{ github.event.deployment_status.environment_url }}"
          echo "Dashboard URL: $ENVIRONMENT_URL"

          ENVIRONMENT_ID=$(python3 -c "
          from urllib.parse import urlparse, parse_qs
          qs = parse_qs(urlparse('$ENVIRONMENT_URL').query)
          ids = qs.get('environmentId', [])
          print(ids[0] if ids else '')
          ")

          if [ -z "$ENVIRONMENT_ID" ]; then
            echo "Could not extract environmentId from: $ENVIRONMENT_URL"
            exit 1
          fi
          echo "environmentId: $ENVIRONMENT_ID"

          # Build the GraphQL request body (jq handles JSON escaping)
          BODY=$(jq -n --arg envId "$ENVIRONMENT_ID" \
            '{"query": ("query { deployments(input: { environmentId: \"" + $envId + "\" }) { edges { node { staticUrl url status } } } }")}')

          RAILWAY_RESPONSE=$(curl -s -X POST \
            "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "Railway API response:"
          echo "$RAILWAY_RESPONSE" | jq '.'

          # staticUrl is the Railway-assigned service domain (no https:// prefix).
          # Fall back to url if staticUrl is absent.
          API_URL=$(echo "$RAILWAY_RESPONSE" | \
            jq -r '[.data.deployments.edges[].node | select(.status == "SUCCESS") | (.staticUrl // .url)] | first // empty')

          if [ -z "$API_URL" ]; then
            echo "Could not extract service URL from Railway API response. Exiting."
            exit 1
          fi

          # Ensure https:// prefix
          if [[ "$API_URL" != https://* && "$API_URL" != http://* ]]; then
            API_URL="https://$API_URL"
          fi

          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "Resolved API_URL: $API_URL"

      - name: Extract branch name
        id: branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REF="${{ github.event.deployment.ref }}"

          # Railway sets ref to the commit SHA (40 hex chars), not the branch name.
          if echo "$REF" | grep -qE '^[0-9a-f]{40}$'; then
            echo "ref is a commit SHA — resolving to branch name via GitHub API..."
            BRANCH=$(curl -s \
              "https://api.github.com/repos/${{ github.repository }}/commits/$REF/branches-where-head" \
              -H "Authorization: Bearer $GH_TOKEN" | \
              jq -r '.[0].name // empty')
            if [ -z "$BRANCH" ]; then
              echo "Could not resolve branch name from SHA $REF. Exiting."
              exit 1
            fi
          else
            BRANCH="$REF"
            BRANCH="${BRANCH#refs/heads/}"
          fi

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Branch: $BRANCH"

      - name: Set API_URL in Vercel for this branch
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          API_URL="${{ steps.railway.outputs.api_url }}"

          echo "Setting API_URL=$API_URL for branch $BRANCH in Vercel..."

          # URL-encode the branch name (handles slashes in e.g. feat/my-branch)
          BRANCH_ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$BRANCH', safe=''))")

          # Upsert: PATCH if the variable already exists, POST if not.
          # POST returns ENV_ALREADY_EXISTS (400) on a second Railway deploy.
          ENV_ID=$(curl -s \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?gitBranch=$BRANCH_ENCODED" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | \
            jq -r ".envs[] | select(.key == \"API_URL\" and .gitBranch == \"$BRANCH\") | .id" | \
            head -1)

          if [ -n "$ENV_ID" ]; then
            echo "Updating existing env var $ENV_ID..."
            curl -s -X PATCH \
              "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env/$ENV_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"value\": \"$API_URL\"}" | jq '.'
          else
            echo "Creating new env var..."
            curl -s -X POST \
              "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"key\": \"API_URL\",
                \"value\": \"$API_URL\",
                \"type\": \"plain\",
                \"target\": [\"preview\"],
                \"gitBranch\": \"$BRANCH\"
              }" | jq '.'
          fi

      - name: Trigger Vercel redeploy for this branch
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          echo "Fetching latest Vercel deployment for branch $BRANCH..."

          DEPLOYMENT=$(curl -s \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=preview&limit=10" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | \
            jq -r ".deployments[] | select(.meta.githubCommitRef == \"$BRANCH\") | .uid" | \
            head -1)

          if [ -z "$DEPLOYMENT" ]; then
            echo "No Vercel deployment found for branch $BRANCH. Skipping redeploy."
            exit 0
          fi

          echo "Redeploying Vercel deployment $DEPLOYMENT..."

          curl -s -X POST \
            "https://api.vercel.com/v13/deployments?forceNew=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"deploymentId\": \"$DEPLOYMENT\",
              \"target\": \"preview\"
            }" | jq '.'
